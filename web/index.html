<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="JBG Notification App">

  <!-- PWA: standalone app behaviour on iOS and Android -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="JBG">
  <meta name="theme-color" content="#000000">

  <!-- Apple touch icons (home screen icon on iOS) -->
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>JBG</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // Register Firebase service worker BEFORE Flutter boots.
    // Required for background push notifications on all platforms including iOS PWA.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/firebase-messaging-sw.js', { scope: '/' })
        .then(function(reg) {
          console.log('[SW] firebase-messaging-sw.js registered:', reg.scope);
        })
        .catch(function(err) {
          console.error('[SW] firebase-messaging-sw.js registration failed:', err);
        });
    }

    // Called by Flutter (via dart:html) when a foreground FCM message arrives.
    // Tries service worker first (richer options), falls back to Notification API.
    function showPushNotification(title, body, icon) {
      console.log('[JBG] showPushNotification called:', title, body);
      if (!('Notification' in window)) {
        console.warn('[JBG] Notification API not supported');
        return;
      }
      console.log('[JBG] Notification.permission:', Notification.permission);
      if (Notification.permission !== 'granted') return;

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.ready.then(function(reg) {
          console.log('[JBG] Showing via service worker');
          return reg.showNotification(title, {
            body: body,
            icon: icon || '/icons/Icon-192.png',
            badge: '/icons/Icon-192.png',
            vibrate: [200, 100, 200],
            tag: 'jbg-order',
            renotify: true,
            requireInteraction: false
          });
        }).catch(function(err) {
          console.warn('[JBG] SW notification failed, using Notification API:', err);
          new Notification(title, { body: body, icon: icon || '/icons/Icon-192.png' });
        });
      } else {
        new Notification(title, { body: body, icon: icon || '/icons/Icon-192.png' });
      }
    }
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
