<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="JBG Notification App">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="JBG">
  <meta name="theme-color" content="#000000">

  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>JBG</title>
  <link rel="manifest" href="manifest.json">

  <!-- Firebase compat SDK — deferred so HTML parsing and Flutter bootstrap
       are not blocked by CDN latency. firebase_setup.js (also deferred)
       depends on these and executes after them in DOM order. -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js" defer></script>
  <script src="firebase_setup.js" defer></script>

  <style>
    /* Notification permission overlay — shown on all platforms when permission
       has not been granted yet.  A real <button> click satisfies every
       browser's user-gesture requirement for Notification + PushManager. */
    #_jbg-notif-overlay {
      display: none;
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.93); z-index: 99999;
      flex-direction: column; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      color: #fff; text-align: center; padding: 32px; box-sizing: border-box;
    }
    #_jbg-notif-overlay._active { display: flex; }
    #_jbg-notif-overlay img   { width:80px; height:80px; border-radius:18px; margin-bottom:24px; }
    #_jbg-notif-overlay h2    { font-size:22px; font-weight:700; margin:0 0 12px; }
    #_jbg-notif-overlay p     { font-size:15px; line-height:1.55; color:rgba(255,255,255,0.65); margin:0; max-width:300px; }
    #_jbg-notif-allow {
      background:#fff; color:#000; border:none; border-radius:12px;
      padding:16px 0; font-size:17px; font-weight:600;
      margin-top:32px; width:100%; max-width:320px; cursor:pointer;
    }
    #_jbg-notif-skip {
      background:transparent; color:rgba(255,255,255,0.45); border:none;
      padding:12px; font-size:15px; margin-top:8px; cursor:pointer;
    }
  </style>
</head>
<body>
  <div id="_jbg-notif-overlay" role="dialog" aria-modal="true">
    <img src="icons/Icon-192.png" alt="JBG">
    <h2>Enable Notifications</h2>
    <p>Allow JBG to send you real-time outlet notifications so you never miss an order.</p>
    <button id="_jbg-notif-allow">Allow Notifications</button>
    <button id="_jbg-notif-skip">Not now</button>
  </div>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
