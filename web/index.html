<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="JBG Notification App">

  <!-- PWA: standalone app behaviour on iOS and Android -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="JBG">
  <meta name="theme-color" content="#000000">

  <!-- Apple touch icons (home screen icon on iOS) -->
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>JBG</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // Register Firebase service worker BEFORE Flutter boots.
    // Required for background push notifications on all platforms including iOS PWA.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/firebase-messaging-sw.js', { scope: '/' })
        .then(function(reg) {
          console.log('[SW] firebase-messaging-sw.js registered:', reg.scope);
        })
        .catch(function(err) {
          console.error('[SW] firebase-messaging-sw.js registration failed:', err);
        });
    }
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
